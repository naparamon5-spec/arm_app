name: arm_app
description: Ardent Resource Management — Quote Approval System for enterprise managers.
publish_to: 'none'
version: 2.4.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.19.0
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ARM.png
    - assets/ArdentLogo.png
  fonts:
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/static/HankenGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/HankenGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/HankenGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/HankenGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/HankenGrotesk-ExtraBold.ttf
          weight: 800
