name: arm_app
description: Ardent Resource Management — Quote Approval System for enterprise managers.
publish_to: 'none'
version: 3.5.2+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  pdfx: ^2.6.0
  syncfusion_flutter_pdfviewer: ^33.2.10
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  http: ^1.2.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/ARM.png
    - assets/ArdentLogo.png
    - assets/developed_by_branding.png
    - assets/ArdentLogoCentred.png
    - assets/ARMCentred.png
    - assets/ARMLauncherIcon.png
  fonts:
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/static/HankenGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/HankenGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/HankenGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/HankenGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/HankenGrotesk-ExtraBold.ttf
          weight: 800
